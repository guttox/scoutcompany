version: '3.8'
services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      # Auth
      - AUTHENTICATION_API_KEY=scout-evolution-key
      # Database
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution123@postgres:5432/evolution
      # Redis (cache de instâncias — sem isso, Baileys nunca gera QR)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=scout-evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false
      # QR Code config
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#175197
      # Log mais limpo
      - LOG_LEVEL=ERROR,WARN,INFO
      - LOG_COLOR=true
      # Confirma envio (default true)
      - CONFIRM_REPLACE_CREDENTIALS=true
      # FORÇA versão do WhatsApp Web mais recente (Baileys default v2.2.3 tá outdated → WS fecha)
      - CONFIG_SESSION_PHONE_VERSION=2,3000,1025109230
      - CONFIG_SESSION_PHONE_CLIENT=Chrome (Linux)
      - CONFIG_SESSION_PHONE_NAME=Chrome
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution123
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
