# Stack Scout — single compose file pra rodar em VPS.
# Sobe: scout-app (webhook), Evolution API (WhatsApp), Postgres (Evolution), Redis (Evolution cache).
#
# Uso:
#   docker compose up -d           # sobe tudo
#   docker compose ps              # status
#   docker compose logs -f scout   # acompanha webhook
#   docker compose exec scout python scripts/dispatcher.py     # roda dispatcher
#   docker compose exec scout python scripts/run_all.py        # roda pipeline diário
#   docker compose exec scout bash scripts/weekly_pipeline.sh  # roda weekly

services:
  # ───────────── Webhook + scripts Scout ─────────────
  scout:
    build: .
    container_name: scout
    restart: unless-stopped
    env_file: .env
    environment:
      # Internamente, scout-app fala com Evolution pelo hostname do compose
      EVOLUTION_URL: http://evolution:8080
    ports:
      # bind 127.0.0.1: webhook só acessível via SSH tunnel
      # (Docker bypassa UFW — precisa restringir aqui na porta de host)
      - "127.0.0.1:5005:5005"
    volumes:
      - ./data:/app/data
      - ./conversas:/app/conversas
      - ./mensagens:/app/mensagens
      - ./logs:/app/logs
      - ./relatorios:/app/relatorios
    depends_on:
      - evolution
    networks:
      - scout-net

  # ───────────── Evolution API (WhatsApp via Baileys) ─────────────
  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: evolution
    restart: unless-stopped
    ports:
      # bind 127.0.0.1: Evolution API só acessível via SSH tunnel
      # (Docker bypassa UFW — precisa restringir aqui na porta de host)
      - "127.0.0.1:8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_APIKEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution123@postgres:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/0
      CACHE_REDIS_PREFIX_KEY: scout-evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#175197"
      LOG_LEVEL: "ERROR,WARN,INFO"
      LOG_COLOR: "true"
      CONFIRM_REPLACE_CREDENTIALS: "true"
      CONFIG_SESSION_PHONE_VERSION: "2,3000,1025109230"
      CONFIG_SESSION_PHONE_CLIENT: "Chrome (Linux)"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
    volumes:
      # ESSENCIAL — persiste sessão WhatsApp entre restarts (sem isso pede QR de novo)
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      - postgres
      - redis
    networks:
      - scout-net

  postgres:
    image: postgres:15-alpine
    container_name: scout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution123
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scout-net

  redis:
    image: redis:7-alpine
    container_name: scout-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - scout-net

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  evolution_store:

networks:
  scout-net:
    driver: bridge
